<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Legends Golf Club - Club Repair Requests</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; padding: 20px; background: #f4f4f4; color: #333; }
    .card { max-width: 500px; margin: 40px auto; background: white; padding: 30px; border-radius: 16px; box-shadow: 0 6px 25px rgba(0,0,0,0.12); }
    button { width: 100%; padding: 16px; margin: 10px 0; background: #1a3c34; color: white; border: none; border-radius: 10px; font-size: 1.1rem; cursor: pointer; }
    input, select, textarea { width: 100%; padding: 14px; margin: 8px 0; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; }
    .tab { display: flex; margin-bottom: 20px; }
    .tab button { flex: 1; padding: 15px; background: #1a3c34; color: white; border: none; font-size: 1.05rem; }
    .tab button.active { background: #0f2a24; }
    .pricing { background: #f8f9fa; padding: 15px; border-radius: 8px; margin: 15px 0; }
    iframe { border: none; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
  </style>
</head>
<body>

  <div class="card">
    <h1 style="text-align:center; color:#1a3c34;">Legends Golf Club</h1>
    <h2 style="text-align:center;">Club Repair Requests</h2>

    <!-- Tabs -->
    <div class="tab">
      <button onclick="showTab(0)" class="active" id="tab0">Submit Request</button>
      <button onclick="showTab(1)" id="tab1">Staff View</button>
    </div>

    <!-- MEMBER FORM -->
    <div id="memberSection">
      <form id="repairForm">
        <label>Member Name</label>
        <input type="text" id="name" required>

        <label>Email or Phone</label>
        <input type="text" id="contact" required>

        <label>Service Type</label>
        <select id="serviceType" required>
          <option value="">Select...</option>
          <option value="Reshaft">Reshaft</option>
          <option value="Regrip">Regrip</option>
          <option value="Other">Other / General Repair</option>
        </select>

        <label>Club Type</label>
        <input type="text" id="clubType" required placeholder="e.g. Driver, 7-Iron">

        <label>Issue Description</label>
        <textarea id="description" rows="4" required></textarea>

        <label>Urgency</label>
        <select id="urgency">
          <option value="Standard">Standard (3-5 days)</option>
          <option value="Rush">Rush (1-2 days)</option>
        </select>

        <label>Photo (optional)</label>
        <input type="file" id="photo" accept="image/*">

        <button type="submit">Submit Repair Request</button>
      </form>

      <div class="pricing">
        <strong>Reshafts:</strong> $25 (1 club) • $20/club (2-5) • $15/club (6+)<br>
        <strong>Regrips:</strong> $5 labor per club + grip cost<br><br>
        <a href="https://www.globalgolf.com/golf-accessories/grips/" target="_blank">Look up current grip prices →</a>
      </div>
    </div>

    <!-- STAFF VIEW (Google Sheet Iframe) -->
    <div id="staffSection" style="display:none;">
      <p style="text-align:center; margin-bottom:15px;"><strong>Staff:</strong> Update status, assign technicians, and add notes directly below.</p>
      
      <!-- Replace the URL below with your actual Google Sheet edit link -->
      <iframe 
        src="https://docs.google.com/spreadsheets/d/YOUR_SHEET_ID_HERE/edit?usp=sharing" 
        width="100%" 
        height="700"
        allowfullscreen>
      </iframe>
    </div>
  </div>

  <script>
    const BACKEND_URL = "https://script.google.com/macros/s/AKfycbzUzvcccC2aLCUnKAh6PC4Ni7es6nISGQhhPoeHQPJOIklNbUffD1HT_SvOY6BW7mnGZQ/exec";

    function showTab(tab) {
      const member = document.getElementById('memberSection');
      const staff = document.getElementById('staffSection');
      const tab0 = document.getElementById('tab0');
      const tab1 = document.getElementById('tab1');

      if (tab === 0) {
        member.style.display = 'block';
        staff.style.display = 'none';
        tab0.classList.add('active');
        tab1.classList.remove('active');
      } else {
        member.style.display = 'none';
        staff.style.display = 'block';
        tab0.classList.remove('active');
        tab1.classList.add('active');
      }
    }

    // Member form submission
    document.getElementById('repairForm').addEventListener('submit', async function(e) {
      e.preventDefault();

      const data = {
        action: "submit",
        id: 'R' + Date.now().toString().slice(-6),
        date: new Date().toLocaleDateString(),
        name: document.getElementById('name').value,
        contact: document.getElementById('contact').value,
        serviceType: document.getElementById('serviceType').value,
        clubType: document.getElementById('clubType').value,
        description: document.getElementById('description').value,
        urgency: document.getElementById('urgency').value
      };

      try {
        await fetch(BACKEND_URL, {
          method: 'POST',
          mode: 'no-cors',
          body: JSON.stringify(data)
        });
        alert('Repair request submitted successfully!');
        e.target.reset();
      } catch (err) {
        alert('Submission failed. Please try again.');
      }
    });
  </script>
</body>
</html>
